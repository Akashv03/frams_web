<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Student Management</h2>

<!-- Add Student Form -->
<form action="/add_student" method="POST" class="row g-3 mb-4">
    <div class="col-md-2">
        <input type="text" name="regno" class="form-control" placeholder="Reg No" required>
    </div>
    <div class="col-md-2">
        <input type="text" name="name" class="form-control" placeholder="Name" required>
    </div>
    <div class="col-md-2">
        <input type="text" name="department" class="form-control" placeholder="Department" required>
    </div>
    <div class="col-md-2">
        <input type="number" name="year" class="form-control" placeholder="Year" required>
    </div>
    <div class="col-md-2">
        <input type="text" name="section" class="form-control" placeholder="Section" required>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary">Add</button>
    </div>
</form>

<!-- Students Table -->
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Reg No</th>
            <th>Name</th>
            <th>Dept</th>
            <th>Year</th>
            <th>Section</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for s in students %}
        <tr>
            <form action="/edit_student/{{ s.id }}" method="POST">
                <td>{{ s.id }}</td>
                <td><input type="text" name="regno" value="{{ s.regno }}" class="form-control"></td>
                <td><input type="text" name="name" value="{{ s.name }}" class="form-control"></td>
                <td><input type="text" name="department" value="{{ s.department }}" class="form-control"></td>
                <td><input type="number" name="year" value="{{ s.year }}" class="form-control"></td>
                <td><input type="text" name="section" value="{{ s.section }}" class="form-control"></td>
                <td>
                    <button class="btn btn-success btn-sm">Update</button>
                    <a href="/delete_student/{{ s.id }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </form>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
